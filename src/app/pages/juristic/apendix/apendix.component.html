
<table mat-table class="mat-elevation-z8" >
  <ng-container matColumnDef="fineCodeId">
    <th mat-header-cell *matHeaderCellDef>Código</th>
    <td mat-cell *matCellDef="let fineCode"></td>
  </ng-container>

  <ng-container matColumnDef="fineDescription">
    <th mat-header-cell *matHeaderCellDef>Descrição</th>
    <td mat-cell *matCellDef="let fineCode"></td>
  </ng-container>

  <ng-container matColumnDef="fineKm">
    <th mat-header-cell *matHeaderCellDef>KM</th>
    <td mat-cell *matCellDef="let fineCode"></td>
  </ng-container>

  <ng-container matColumnDef="fineAlias">
    <th mat-header-cell *matHeaderCellDef>Alias</th>
    <td mat-cell *matCellDef="let fineCode"></td>
  </ng-container>

  <ng-container matColumnDef="fineOrder">
    <th mat-header-cell *matHeaderCellDef>Ordem</th>
    <td mat-cell *matCellDef="let fineCode"></td>
  </ng-container>

  <tr mat-header-row *matHeaderRowDef="fineCodeHeader"></tr>
  <tr mat-row *matRowDef="let row; columns: fineCodeHeader;"></tr>
</table>
