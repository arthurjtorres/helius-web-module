<ng-container class="registration-container">
  <header class="registration-header">
    <h1 class="header-title">Cadastro de Funcionários</h1>

    
      <button mat-fab extended class="button-import">
        <mat-icon>cloud_upload</mat-icon>Importar Arquivo
      </button>
    
  </header>
  <mat-divider></mat-divider>

  <div class="form-container">
    <mat-card class="employee-card" appearance="outlined">
      <mat-card-header>
        <mat-card-title class="form-title">Dados do Colaborador</mat-card-title>
      </mat-card-header>
      <mat-card-content>
        <form id="employeeForm" [formGroup]="employeeData" class="employee-data">
          
          <mat-form-field appearance="outline">
            <mat-label>Matrícula</mat-label>
            <input matInput type="text"/>
          </mat-form-field>
          
          <mat-form-field appearance="outline">
            <mat-label>Data de Admissão</mat-label>
            <input matInput type="date"/>
          </mat-form-field>

          <mat-form-field appearance="outline">
            <mat-label>Empresa</mat-label>
            <mat-select>
              <mat-option value="one">First</mat-option>
            </mat-select>
          </mat-form-field>
          
          <mat-form-field appearance="outline">
            <mat-label>Função</mat-label>
            <mat-select>
              <mat-option value="one">First</mat-option>
            </mat-select>
          </mat-form-field>

          <mat-form-field appearance="outline">
            <mat-label>Setor</mat-label>
            <mat-select>
              <mat-option value="one">First</mat-option>
            </mat-select>
          </mat-form-field>

          <mat-form-field appearance="outline">
            <mat-label>Departamento</mat-label>
            <mat-select>
              <mat-option value="one">First</mat-option>
            </mat-select>
          </mat-form-field>       
              
        </form>
      </mat-card-content>
    </mat-card>

    
  </div>
</ng-container>
