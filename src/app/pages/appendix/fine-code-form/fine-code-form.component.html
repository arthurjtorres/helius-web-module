<h2 mat-dialog-title>Adicionar Novo Código de Multa</h2>
<mat-dialog-content>
  <form [formGroup]="form" class="form-container">
    <mat-form-field appearance="outline">
      <mat-label>Código</mat-label>
      <input matInput formControlName="fineNumber" >
    </mat-form-field>

    <mat-form-field appearance="outline">
      <mat-label>Descrição</mat-label>
      <input matInput formControlName="fineDescription">
    </mat-form-field>

    <div class="row">
      <mat-form-field appearance="outline">
        <mat-label>KM</mat-label>
        <input matInput formControlName="fineKm">
      </mat-form-field>

      <mat-form-field appearance="outline">
        <mat-label>Alias</mat-label>
        <input matInput formControlName="fineAlias">
      </mat-form-field>
    </div>
  </form>
</mat-dialog-content>

<mat-dialog-actions align="end">
  <button mat-button (click)="onCancel()">Cancelar</button>
  <button mat-raised-button color="primary" (click)="onSave()" [disabled]="form.invalid">Salvar</button>
</mat-dialog-actions>
