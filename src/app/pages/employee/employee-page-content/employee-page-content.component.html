<ng-container class="personnel-container">
  <header class="personnel-header">
    <button mat-fab extended class="button-import" (click)="importEmployee()">
      <mat-icon>cloud_upload</mat-icon>Importar Arquivo
    </button>

    <mat-form-field class="header-search" appearance="outline">
      <input matInput type="search" />
      <button matSuffix mat-icon-button aria-label="Search">
        <mat-icon>search</mat-icon>
      </button>
    </mat-form-field>

    <button mat-fab extended class="button-import" (click)="addEmployee()">
      <mat-icon>person_add</mat-icon>Adicionar
    </button>
  </header>
  <mat-divider></mat-divider>

  <div class="table-container">
    <mat-table class="mat-elevation-z8" [dataSource]="employeeDataSource" matSort>
      <ng-container matColumnDef="registration">
        <mat-header-cell *matHeaderCellDef class="registration">Matrícula</mat-header-cell>
        <mat-cell *matCellDef="let item" class="registration"> {{item.registration || '-'}}</mat-cell>
      </ng-container>

      <ng-container matColumnDef="company">
        <mat-header-cell *matHeaderCellDef class="company">Empresa</mat-header-cell>
        <mat-cell *matCellDef="let item" class="company"> {{item.company || '-'}}</mat-cell>
      </ng-container>

      <ng-container matColumnDef="fullName">
        <mat-header-cell *matHeaderCellDef class="fullName">Nome Completo</mat-header-cell>
        <mat-cell *matCellDef="let item" class="fullName"> {{item.fullName || '-'}}</mat-cell>
      </ng-container>

      <ng-container matColumnDef="birthDate">
        <mat-header-cell *matHeaderCellDef class="birthDate">Data de Nascimento</mat-header-cell>
        <mat-cell *matCellDef="let item" class="birthDate"> {{ (item.birthDate | date:'dd/MM/yyyy') || '-' }}</mat-cell>
      </ng-container>

      <ng-container matColumnDef="admissionDate">
        <mat-header-cell *matHeaderCellDef class="admissionDate">Data de Admissão</mat-header-cell>
        <mat-cell *matCellDef="let item" class="admissionDate"> {{ (item.admissionDate | date:'dd/MM/yyyy') || '-' }}</mat-cell>
      </ng-container>

      <ng-container matColumnDef="position">
        <mat-header-cell *matHeaderCellDef class="position">Função</mat-header-cell>
        <mat-cell *matCellDef="let item" class="position"> {{item.position || '-'}}</mat-cell>
      </ng-container>

      <ng-container matColumnDef="actions">
        <mat-header-cell *matHeaderCellDef class="actions">Ações</mat-header-cell>
        <mat-cell *matCellDef="let item" class="actions">
          <button
            mat-icon-button
            color="primary"
            (click)="editEmployee(item)"
            matTooltip="Editar"
          >
            <mat-icon>edit</mat-icon>
          </button>

          <button
            mat-icon-button
            color="warn"
            (click)="deleteEmployee(item)"
            matTooltip="Excluir"
          >
            <mat-icon>delete</mat-icon>
          </button>
          
        </mat-cell>
      </ng-container>

      <mat-header-row *matHeaderRowDef="employeeHeader"></mat-header-row>
      <mat-row *matRowDef="let row; columns: employeeHeader"></mat-row>
    </mat-table>
  </div>

  <mat-paginator
    [pageSizeOptions]="[10, 20, 50]"
    showFirstLastButtons
    aria-label="Select Page"
  ></mat-paginator>
  
</ng-container>
