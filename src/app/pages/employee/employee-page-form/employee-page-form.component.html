<h2 mat-dialog-title>{{ isEdit ? 'Editar Cadastro de Funcionário' : 'Novo Cadastro de Funcionário'}}</h2>

<mat-dialog-content>
  <form [formGroup]="employeeForm" class="form-container">

  <mat-form-field appearance="outline">
            <mat-label>Matrícula</mat-label>
            <input matInput type="text"/>
          </mat-form-field>
          
          <mat-form-field appearance="outline">
            <mat-label>Data de Admissão</mat-label>
            <input matInput type="date"/>
          </mat-form-field>

          <mat-form-field appearance="outline">
            <mat-label>Empresa</mat-label>
            <mat-select>
              <mat-option value="one">First</mat-option>
            </mat-select>
          </mat-form-field>
          
          <mat-form-field appearance="outline">
            <mat-label>Função</mat-label>
            <mat-select>
              <mat-option value="one">First</mat-option>
            </mat-select>
          </mat-form-field>

          <mat-form-field appearance="outline">
            <mat-label>Setor</mat-label>
            <mat-select>
              <mat-option value="one">First</mat-option>
            </mat-select>
          </mat-form-field>

          <mat-form-field appearance="outline">
            <mat-label>Departamento</mat-label>
            <mat-select>
              <mat-option value="one">First</mat-option>
            </mat-select>
          </mat-form-field>       
              
        </form>

</mat-dialog-content>

<mat-dialog-actions align="end">
  <button mat-button (click)="onCancel()" color="warn">Descartar</button>
  <button mat-raised-button color="primary" (click)="onSave()" [disabled]="employeeForm.invalid">
    <mat-icon>{{ isEdit ? 'edit' : 'save'}}</mat-icon> {{ isEdit ? 'Atualizar' : 'Cadastrar'}}
  </button>
</mat-dialog-actions>
