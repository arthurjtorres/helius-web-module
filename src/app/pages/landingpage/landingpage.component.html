<div class="login-wrapper">
  <mat-card class="login-card">
    <div class="card-side left-side">
      <div class="content">
        <h1>BEM-VINDO!</h1>
        <p>Acesse nosso Sistema!</p>
      </div>
    </div>

    <div class="card-side right-side">
      <h2>Faça Login</h2>

      <form [formGroup]="loginForm" (ngSubmit)="onSubmit()">
        <div class="input-group">
          <label for="userLogin">Usuário ou Email</label>
          <mat-form-field appearance="outline" class="custom-field">
            <mat-icon matPrefix>person</mat-icon>
            <input
              matInput
              id="userLogin"
              formControlName="userLogin"
              placeholder="Usuário ou Email"
            />
          </mat-form-field>
        </div>

        <div class="input-group">
          <label for="password">Senha</label>
          <mat-form-field appearance="outline" class="custom-field">
            <mat-icon matPrefix>lock</mat-icon>
            <input
              matInput
              [type]="hidePassword ? 'password' : 'text'"
              id="password"
              formControlName="password"
              placeholder="Digite sua Senha!"
            />

            <button
              mat-button
              matSuffix
              type="button"
              (click)="hidePassword = !hidePassword"
              
              [attr.aria-label]="'Ocultar senha'" 
              [attr.aria-pressed]="hidePassword"
            >
              <mat-icon class="show-pass-icon">{{ hidePassword ? 'visibility_off' : 'visibility' }}</mat-icon>
            </button>
          </mat-form-field>
        </div>

        <div class="form-options">
          <mat-checkbox fromControlName="savePassword" color="primary"
            >Lembrar-me</mat-checkbox
          >
          <a href="#" class="forgot-link">Esqueceu sua senha?</a>
        </div>

        <button mat-flat-button color="primary" class="btn-block bnt-enter">
          Entrar
        </button>
      </form>
    </div>
  </mat-card>
</div>
