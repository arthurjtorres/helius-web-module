<mat-toolbar class="mat-elevation-z3">
  <button mat-icon-button (click)="collapsed.set(!collapsed())"><mat-icon>menu</mat-icon></button>
</mat-toolbar>
<mat-sidenav-container>
  <mat-sidenav class="sidebar" opened mode="side" [style.width]="sidebarWidth()">
    <app-sidebar [collapsed]="collapsed()"/>
  </mat-sidenav>

  <mat-sidenav-content class="content" [style.margin-left]="sidebarWidth()">
    <router-outlet></router-outlet>
  </mat-sidenav-content>
</mat-sidenav-container>
