<div class="sidebar" [ngClass]="{ 'sidebar-collapsed': isSidebarCollapsed }">
  <div class="sidebar-header">
    <button matMiniFab class="sidebar-toggle-btn" (click)="onSidebarToggle()">
      <mat-icon class="material-icons">menu</mat-icon>
    </button>

    <a href="/" class="sidebar-logo" *ngIf="!isSidebarCollapsed">Helius</a>
  </div>

  <div class="sidebar-menu">
    <mat-nav-list>        

        <ng-container *ngFor="let item of menuItems" class="sidebar-menu-item">
          
          <a
          
            class="sidebar-item"
            [routerLink]="item.route"
            [routerLinkActive]="['menu-item-active']"
            [class.has-children]="item.children"
            (click)="toggleMenuItem(item)"
            [matMenuTriggerFor]="(isSidebarCollapsed && item.children) ? itemMenu : null"
          >
            <mat-icon class="material-icons sidebar-icon">{{ item.icon }}</mat-icon>
            <span class="sidebar-item-text">{{ item.label }}</span>
            
            <mat-icon
              *ngIf="item.children && !isSidebarCollapsed"
              class="material-icons sidebar-item-arrow"
              [ngClass]="{ rotated: item.isOpen }"
              >{{ "keyboard_arrow_right" }}</mat-icon
            >
          </a>

          <ul
            *ngIf="item.children && !isSidebarCollapsed && item.isOpen"
            class="sidebar-submenu"
          >
            <li *ngFor="let child of item.children">
              <a
                [routerLink]="child.route"
                [routerLinkActive]="['menu-item-active']"
                class="sidebar-item sidebar-subitem"
              >
                <mat-icon class="material-icons sidebar-icon subitem-icon">{{
                  child.icon
                }}</mat-icon>
                <span class="sidebar-item-text">{{ child.label }}</span>
              </a>
            </li>
          </ul>

          <mat-menu 
            #itemMenu="matMenu" 
            xPosition="after" 
            panelClass="sidebar-flyout-menu"
          >
            <ng-container *ngIf="item.children">
              <button 
                mat-menu-item 
                *ngFor="let child of item.children"
                [routerLink]="child.route"
                [routerLinkActive]="['menu-item-active-flyout']"
              >
                <mat-icon>{{ child.icon }}</mat-icon>
                <span>{{ child.label }}</span>
              </button>
            </ng-container>
          </mat-menu>

        </ng-container>
      
    </mat-nav-list>
  </div>
</div>
